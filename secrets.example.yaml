###############################################################################
# OwnerRez Lock Manager — secrets.example.yaml
#
# Copy this file to your HA config root as secrets.yaml (or merge these keys
# into your existing secrets.yaml). Never commit secrets.yaml to version control.
###############################################################################

# ──────────────────────────────────────────────────────────────────────────────
# OwnerRez API Credentials
# ──────────────────────────────────────────────────────────────────────────────
ownerrez_username: "your-email@example.com"
ownerrez_token: "pt_your_token_here"

# ──────────────────────────────────────────────────────────────────────────────
# Property Configuration
# ──────────────────────────────────────────────────────────────────────────────

# Your OwnerRez property ID (found in OwnerRez → Properties → URL)
ownerrez_property_id: "386633"

# Full API URL — update property_ids to match ownerrez_property_id above.
# The from/to dates are managed automatically by the automation but the URL
# itself must be updated here when the date range is refreshed.
ownerrez_api_url: "https://api.ownerrez.com/v2/bookings?property_ids=386633&limit=20&from=2026-03-01&to=2026-12-31&include_door_codes=true&include_guest=true"

# ──────────────────────────────────────────────────────────────────────────────
# Lock Configuration
# ──────────────────────────────────────────────────────────────────────────────

# Comma-separated list of lock entity IDs (one per lock in your property)
ownerrez_lock_entities: "lock.entry_door"

# The primary/first lock entity — used as the arrival trigger
ownerrez_primary_lock: "lock.entry_door"

# Comma-separated list of code slots — one slot per lock above (same order)
ownerrez_lock_code_slots: "15"

# ──────────────────────────────────────────────────────────────────────────────
# Notifications
# ──────────────────────────────────────────────────────────────────────────────

# Home Assistant mobile notify target for your phone
# Find yours under Settings → Companion App → General → Device Name
ownerrez_notify_target: "notify.mobile_app_iphone_17"
