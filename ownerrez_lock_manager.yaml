###############################################################################
# OwnerRez Lock Manager for Home Assistant
# Version: 1.3.0 (Two-Step Lock Programming) - Updated for Z-Wave JS
# https://github.com/yourusername/ownerrez-lock-manager
#
# INSTALLATION:
# 1. Add credentials to secrets.yaml:
#    ownerrez_username: "your-email@example.com"
#    ownerrez_token: "pt_your_token_here"
#
# 2. Place this file in: /config/packages/ownerrez_lock_manager.yaml
#
# 3. Enable packages in configuration.yaml:
#    homeassistant:
#      packages: !include_dir_named packages
#
# 4. Customize the settings below (search for "CUSTOMIZE")
#
# 5. Restart Home Assistant
###############################################################################

###############################################################################
# PROPERTY CONFIGURATION
# CUSTOMIZE: Add your OwnerRez property ID(s)
###############################################################################
input_text:
  ownerrez_property_ids:
    name: OwnerRez Property IDs
    initial: "386633" #<-- CUSTOMIZE: Update with your property ID
    max: 100

  ownerrez_api_from_date:
    name: API From Date
    initial: "2025-10-14"
    icon: mdi:calendar-start

  ownerrez_api_to_date:
    name: API To Date
    initial: "2026-01-14"
    icon: mdi:calendar-end

  ownerrez_lock_entities:
    name: Lock Entities
    initial: "lock.entry_door" # <-- CUSTOMIZE: Update with your lock entity IDs(multiple separated by commas)
    max: 255

  ownerrez_lock_code_slots:
    name: Lock Code Slots
    initial: "15" #<!--- CUSTOMIZE: Update with the code slots you want to use for each lock(multiple separated by commas, must match lock entities count) 
    max: 100

  ownerrez_current_guest_name:
    name: Current Guest Name
    icon: mdi:account
    max: 100

  ownerrez_current_lock_code:
    name: Current Lock Code
    mode: password
    icon: mdi:lock
    max: 8

  ownerrez_current_booking_id:
    name: Current Booking ID
    icon: mdi:key-variant
    max: 50

input_number:
  ownerrez_lookback_days:
    name: Lookback Days
    initial: 7
    min: 0
    max: 90
    step: 1
    mode: box
    icon: mdi:calendar-minus

  ownerrez_lookahead_days:
    name: Lookahead Days
    initial: 90
    min: 7
    max: 365
    step: 1
    mode: box
    icon: mdi:calendar-plus

input_button:
  ownerrez_update_date_range:
    name: Update API Date Range
    icon: mdi:calendar-refresh

input_boolean:
  ownerrez_lock_code_active:
    name: Lock Code Active
    icon: mdi:lock-check
  
  ownerrez_guest_arrived:
    name: Guest Has Arrived
    icon: mdi:account-check

input_button:
  ownerrez_update_date_range:
    name: Update API Date Range
    icon: mdi:calendar-refresh
  
  ownerrez_activate_code_early:
    name: Activate Guest Code Early
    icon: mdi:lock-clock-plus

###############################################################################
# RESTful API Integration
###############################################################################
rest:
  - resource: "https://api.ownerrez.com/v2/bookings?property_ids=386633&limit=20&from=2025-10-14&to=2026-04-14&include_door_codes=true&include_guest=true"
    scan_interval: 3600
    method: GET
    headers:
      Content-Type: application/json
      Accept: application/json
      User-Agent: Home Assistant OwnerRez Lock Manager v1.3
    authentication: basic
    username: !secret ownerrez_username
    password: !secret ownerrez_token
    sensor:
      - name: "OwnerRez Bookings Raw"
        unique_id: ownerrez_bookings_raw
        value_template: "{{ now().isoformat() }}"
        json_attributes:
          - items
        icon: mdi:calendar-multiple

###############################################################################
# Input Helpers
###############################################################################
input_datetime:
  ownerrez_current_checkin:
    name: Current Check-in Time
    has_date: true
    has_time: true

  ownerrez_current_checkout:
    name: Current Check-out Time
    has_date: true
    has_time: true

###############################################################################
# Template Sensors (Optimized)
###############################################################################
template:
  - sensor:
      - name: "OwnerRez Locks Programmed"
        unique_id: ownerrez_locks_programmed
        state: >
          {% if is_state('input_boolean.ownerrez_lock_code_active', 'on') %}
            {{ states('input_text.ownerrez_lock_entities').split(',') | select | list | length }}
          {% else %}
            0
          {% endif %}
        attributes:
          locks: >
            {% if is_state('input_boolean.ownerrez_lock_code_active', 'on') %}
              {{ states('input_text.ownerrez_lock_entities').split(',') | map('trim') | select | list }}
            {% else %}
              []
            {% endif %}
        icon: mdi:lock-check

      - name: "OwnerRez Next Booking"
        unique_id: ownerrez_next_booking
        state: >
          {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
          {% if bookings is none or bookings | length == 0 %}
            none
          {% else %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set valid = namespace(bookings=[]) %}
            {% for b in bookings %}
              {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                {% set valid.bookings = valid.bookings + [b] %}
              {% endif %}
            {% endfor %}
            {% if valid.bookings | length > 0 %}
              {{ (valid.bookings | sort(attribute='arrival'))[0].id }}
            {% else %}
              none
            {% endif %}
          {% endif %}
        availability: >
          {{ state_attr('sensor.ownerrez_bookings_raw', 'items') is not none }}
        attributes:
          guest_name: >
            {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
            {% if bookings is not none and bookings | length > 0 %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set valid = namespace(bookings=[]) %}
              {% for b in bookings %}
                {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                  {% set valid.bookings = valid.bookings + [b] %}
                {% endif %}
              {% endfor %}
              {% if valid.bookings | length > 0 %}
                {% set next = (valid.bookings | sort(attribute='arrival'))[0] %}
                {% if next.guest is defined and next.guest.first_name is defined %}
                  {{ next.guest.first_name }} {{ next.guest.last_name | default('') }}
                {% else %}
                  Guest
                {% endif %}
              {% endif %}
            {% endif %}
          arrival: >
            {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
            {% if bookings is not none and bookings | length > 0 %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set valid = namespace(bookings=[]) %}
              {% for b in bookings %}
                {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                  {% set valid.bookings = valid.bookings + [b] %}
                {% endif %}
              {% endfor %}
              {% if valid.bookings | length > 0 %}
                {% set next = (valid.bookings | sort(attribute='arrival'))[0] %}
                {{ next.arrival }}T{{ next.check_in | default('16:00') }}:00
              {% endif %}
            {% endif %}
          departure: >
            {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
            {% if bookings is not none and bookings | length > 0 %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set valid = namespace(bookings=[]) %}
              {% for b in bookings %}
                {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                  {% set valid.bookings = valid.bookings + [b] %}
                {% endif %}
              {% endfor %}
              {% if valid.bookings | length > 0 %}
                {% set next = (valid.bookings | sort(attribute='arrival'))[0] %}
                {{ next.departure }}T{{ next.check_out | default('10:00') }}:00
              {% endif %}
            {% endif %}
          status: >
            {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
            {% if bookings is not none and bookings | length > 0 %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set valid = namespace(bookings=[]) %}
              {% for b in bookings %}
                {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                  {% set valid.bookings = valid.bookings + [b] %}
                {% endif %}
              {% endfor %}
              {% if valid.bookings | length > 0 %}
                {{ (valid.bookings | sort(attribute='arrival'))[0].status }}
              {% endif %}
            {% endif %}
          property_id: >
            {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
            {% if bookings is not none and bookings | length > 0 %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set valid = namespace(bookings=[]) %}
              {% for b in bookings %}
                {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                  {% set valid.bookings = valid.bookings + [b] %}
                {% endif %}
              {% endfor %}
              {% if valid.bookings | length > 0 %}
                {{ (valid.bookings | sort(attribute='arrival'))[0].property_id }}
              {% endif %}
            {% endif %}
          confirmation_code: >
            {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
            {% if bookings is not none and bookings | length > 0 %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set valid = namespace(bookings=[]) %}
              {% for b in bookings %}
                {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                  {% set valid.bookings = valid.bookings + [b] %}
                {% endif %}
              {% endfor %}
              {% if valid.bookings | length > 0 %}
                {% set next = (valid.bookings | sort(attribute='arrival'))[0] %}
                {{ next.platform_reservation_number | default('N/A') }}
              {% endif %}
            {% endif %}
          door_code: >
            {% set bookings = state_attr('sensor.ownerrez_bookings_raw', 'items') %}
            {% if bookings is not none and bookings | length > 0 %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set valid = namespace(bookings=[]) %}
              {% for b in bookings %}
                {% if b.type == 'booking' and b.status == 'active' and b.departure >= today %}
                  {% set valid.bookings = valid.bookings + [b] %}
                {% endif %}
              {% endfor %}
              {% if valid.bookings | length > 0 %}
                {% set next = (valid.bookings | sort(attribute='arrival'))[0] %}
                {% if next.door_codes is defined and next.door_codes | length > 0 %}
                  {{ next.door_codes[0].code }}
                {% endif %}
              {% endif %}
            {% endif %}
        icon: mdi:calendar-clock

###############################################################################
# Automations (Optimized)
###############################################################################
automation:
  - id: ownerrez_update_api_date_range
    alias: "OwnerRez: Update API Date Range"
    mode: single
    trigger:
      - trigger: homeassistant
        event: start
        id: startup
      - trigger: time
        at: "01:00:00"
        id: scheduled
      - trigger: state
        entity_id: input_button.ownerrez_update_date_range
        id: manual
    condition:
      - condition: template
        value_template: >
          {{ states('input_text.ownerrez_api_from_date') not in ['unknown', 'unavailable'] }}
    action:
      - variables:
          lookback: "{{ states('input_number.ownerrez_lookback_days') | int(7) }}"
          lookahead: "{{ states('input_number.ownerrez_lookahead_days') | int(90) }}"
          from_date: "{{ (now() - timedelta(days=lookback)).strftime('%Y-%m-%d') }}"
          to_date: "{{ (now() + timedelta(days=lookahead)).strftime('%Y-%m-%d') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ownerrez_api_from_date
        data:
          value: "{{ from_date }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ownerrez_api_to_date
        data:
          value: "{{ to_date }}"
      - condition: template
        value_template: "{{ trigger.id == 'manual' }}"
      - action: persistent_notification.create
        data:
          title: "OwnerRez Date Range Updated"
          message: >
            Date range: {{ from_date }} to {{ to_date }}
            Update REST resource (line ~117) and restart to apply.
          notification_id: ownerrez_date_update

  - id: ownerrez_sync_booking_data
    alias: "OwnerRez: Sync Booking Data"
    mode: restart
    trigger:
      - trigger: state
        entity_id: sensor.ownerrez_next_booking
      - trigger: homeassistant
        event: start
      - trigger: time
        at: "06:00:00"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.ownerrez_next_booking') not in ['none', 'unavailable', 'unknown'] }}
      - condition: template
        value_template: >
          {{ state_attr('sensor.ownerrez_next_booking', 'arrival') is not none }}
    action:
      - variables:
          booking_id: "{{ states('sensor.ownerrez_next_booking') }}"
          guest_name: "{{ state_attr('sensor.ownerrez_next_booking', 'guest_name') }}"
          arrival: "{{ state_attr('sensor.ownerrez_next_booking', 'arrival') }}"
          departure: "{{ state_attr('sensor.ownerrez_next_booking', 'departure') }}"
          door_code: "{{ state_attr('sensor.ownerrez_next_booking', 'door_code') }}"
      - condition: template
        value_template: "{{ door_code != '' and door_code is not none }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ownerrez_current_guest_name
        data:
          value: "{{ guest_name }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ownerrez_current_booking_id
        data:
          value: "{{ booking_id }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ownerrez_current_checkin
        data:
          datetime: "{{ arrival }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ownerrez_current_checkout
        data:
          datetime: "{{ departure }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ownerrez_current_lock_code
        data:
          value: "{{ door_code }}"
      - condition: template
        value_template: "{{ states('input_text.ownerrez_current_booking_id') != booking_id }}"
      - action: persistent_notification.create
        data:
          title: "OwnerRez Booking Synced"
          message: >
            **Guest:** {{ guest_name }}
            **Check-in:** {{ arrival | as_timestamp | timestamp_custom('%b %d at %I:%M %p') }}
            **Lock Code:** {{ door_code }}
            Code will be programmed 5 minutes before check-in.
          notification_id: ownerrez_booking_sync

  - id: ownerrez_enable_lock_code_checkin
    alias: "OwnerRez: Enable Lock Code at Check-in"
    mode: single
    trigger:
      - trigger: time_pattern
        minutes: "/1"
    condition:
      - condition: template
        value_template: "{{ states('input_text.ownerrez_current_guest_name') != '' }}"
      - condition: state
        entity_id: input_boolean.ownerrez_lock_code_active
        state: "off"
      - condition: template
        value_template: >
          {% set checkin = state_attr('input_datetime.ownerrez_current_checkin', 'timestamp') %}
          {% set now_time = now().timestamp() %}
          {{ checkin is not none and now_time >= (checkin - 300) and now_time < (checkin - 240) }}
    action:
      - variables:
          lock_entities: "{{ states('input_text.ownerrez_lock_entities').split(',') | map('trim') | select | list }}"
          code_slots: "{{ states('input_text.ownerrez_lock_code_slots').split(',') | map('trim') | map('int') | list }}"
          lock_code: "{{ states('input_text.ownerrez_current_lock_code') }}"
      - repeat:
          count: "{{ [lock_entities | length, code_slots | length] | min }}"
          sequence:
            - action: zwave_js.set_lock_usercode
              target:
                entity_id: "{{ lock_entities[repeat.index - 1] }}"
              data:
                code_slot: "{{ code_slots[repeat.index - 1] }}"
                usercode: "{{ lock_code }}"
            - delay:
                seconds: 2
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ownerrez_lock_code_active
      
      # Reset the arrival flag for new booking
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ownerrez_guest_arrived
      
      # Persistent notification in Home Assistant UI
      - action: persistent_notification.create
        data:
          title: "Guest Check-in Active"
          message: >
            **{{ states('input_text.ownerrez_current_guest_name') }}** can now check in.
            Code **{{ lock_code }}** programmed to {{ lock_entities | length }} lock(s).
          notification_id: ownerrez_checkin

      # Mobile push notification
      - action: notify.mobile_app_iphone_17
        data:
          title: "🔓 Guest Check-in Active"
          message: >
            {{ states('input_text.ownerrez_current_guest_name') }} can now check in.
            Code {{ lock_code }} programmed to {{ lock_entities | length }} lock(s).

  - id: ownerrez_disable_lock_code_checkout
    alias: "OwnerRez: Disable Lock Code at Check-out"
    mode: single
    trigger:
      - trigger: time_pattern
        minutes: "/1"
    condition:
      - condition: state
        entity_id: input_boolean.ownerrez_lock_code_active
        state: "on"
      - condition: template
        value_template: >
          {% set checkout = state_attr('input_datetime.ownerrez_current_checkout', 'timestamp') %}
          {% set now_time = now().timestamp() %}
          {{ checkout is not none and now_time >= checkout and now_time < (checkout + 60) }}
    action:
      - variables:
          lock_entities: "{{ states('input_text.ownerrez_lock_entities').split(',') | map('trim') | select | list }}"
          code_slots: "{{ states('input_text.ownerrez_lock_code_slots').split(',') | map('trim') | map('int') | list }}"
          guest_name: "{{ states('input_text.ownerrez_current_guest_name') }}"
      - repeat:
          count: "{{ [lock_entities | length, code_slots | length] | min }}"
          sequence:
            - action: zwave_js.clear_lock_usercode
              target:
                entity_id: "{{ lock_entities[repeat.index - 1] }}"
              data:
                code_slot: "{{ code_slots[repeat.index - 1] }}"
            - delay:
                seconds: 2
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ownerrez_lock_code_active
      
      # Reset arrival flag
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ownerrez_guest_arrived
      
      - action: persistent_notification.create
        data:
          title: "Guest Check-out Complete"
          message: >
            **{{ guest_name }}**'s code cleared from {{ lock_entities | length }} lock(s).
          notification_id: ownerrez_checkout
      - action: input_text.set_value
        data:
          value: ""
        target:
          entity_id:
            - input_text.ownerrez_current_guest_name
            - input_text.ownerrez_current_lock_code
            - input_text.ownerrez_current_booking_id

  - id: ownerrez_guest_arrival_notification
    alias: "OwnerRez: Guest Arrival Notification"
    mode: queued
    max: 10
    trigger:
      - trigger: state
        entity_id:
          - lock.entry_door
        to: "unlocked"
    condition:
      - condition: state
        entity_id: input_boolean.ownerrez_lock_code_active
        state: "on"
      # Only notify if guest hasn't arrived yet
      - condition: state
        entity_id: input_boolean.ownerrez_guest_arrived
        state: "off"
      - condition: template
        value_template: >
          {% set locks = states('input_text.ownerrez_lock_entities').split(',') | map('trim') | list %}
          {{ trigger.entity_id in locks }}
    action:
      # Mark guest as arrived
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ownerrez_guest_arrived
      
      # Persistent notification in Home Assistant UI
      - action: persistent_notification.create
        data:
          title: "🚪 Guest Arrived"
          message: >
            **{{ states('input_text.ownerrez_current_guest_name') }}** unlocked {{ state_attr(trigger.entity_id, 'friendly_name') | default(trigger.entity_id) }}.
      
            **Time:** {{ now().strftime('%I:%M %p') }}
            **Date:** {{ now().strftime('%A, %B %d, %Y') }}
          notification_id: "ownerrez_first_arrival"

      # Mobile push notification
      - action: notify.mobile_app_YOUR_DEVICE_NAME
        data:
          title: "🚪 Guest Arrived"
          message: >
            {{ states('input_text.ownerrez_current_guest_name') }} unlocked {{ state_attr(trigger.entity_id, 'friendly_name') | default(trigger.entity_id) }} at {{ now().strftime('%I:%M %p') }} on {{ now().strftime('%A, %B %d, %Y') }}.

  - id: ownerrez_checkin_reminder_24h
    alias: "OwnerRez: Check-in Reminder (24 hours)"
    mode: single
    trigger:
      - trigger: time
        at: "09:00:00"
    condition:
      - condition: template
        value_template: "{{ states('input_text.ownerrez_current_guest_name') != '' }}"
      - condition: template
        value_template: >
          {% set checkin = state_attr('input_datetime.ownerrez_current_checkin', 'timestamp') %}
          {% set now_time = now().timestamp() %}
          {% set diff = checkin - now_time %}
          {{ checkin is not none and diff > 82800 and diff < 90000 }}
    action:
      - action: persistent_notification.create
        data:
          title: "Guest Checking In Tomorrow"
          message: >
            **{{ states('input_text.ownerrez_current_guest_name') }}** checks in tomorrow.
            Code: **{{ states('input_text.ownerrez_current_lock_code') }}**
          notification_id: ownerrez_reminder_checkin

  - id: ownerrez_checkout_reminder_today
    alias: "OwnerRez: Check-out Reminder (Same Day)"
    mode: single
    trigger:
      - trigger: time
        at: "08:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.ownerrez_lock_code_active
        state: "on"
      - condition: template
        value_template: >
          {% set checkout = state_attr('input_datetime.ownerrez_current_checkout', 'timestamp') %}
          {{ checkout is not none and now().date() | string == (checkout | timestamp_custom('%Y-%m-%d')) }}
    action:
      - action: persistent_notification.create
        data:
          title: "Guest Checks Out Today"
          message: >
            **{{ states('input_text.ownerrez_current_guest_name') }}** checks out at 
            {{ state_attr('input_datetime.ownerrez_current_checkout', 'timestamp') | timestamp_custom('%I:%M %p') }}.
          notification_id: ownerrez_reminder_checkout
  
  - id: ownerrez_activate_code_early
    alias: "OwnerRez: Activate Code Early"
    trigger:
      - platform: state
        entity_id: input_button.ownerrez_activate_code_early
    condition:
      - condition: state
        entity_id: input_boolean.ownerrez_lock_code_active
        state: "off"
      - condition: template
        value_template: "{{ states('input_text.ownerrez_current_guest_name') != '' }}"
      - condition: template
        value_template: "{{ states('input_text.ownerrez_current_lock_code') != '' }}"
    action:
      - variables:
          lock_entities: "{{ states('input_text.ownerrez_lock_entities').split(',') | map('trim') | select | list }}"
          code_slots: "{{ states('input_text.ownerrez_lock_code_slots').split(',') | map('trim') | map('int') | list }}"
          lock_code: "{{ states('input_text.ownerrez_current_lock_code') }}"
          guest_name: "{{ states('input_text.ownerrez_current_guest_name') }}"
      
      - repeat:
          count: "{{ [lock_entities | length, code_slots | length] | min }}"
          sequence:
            - action: zwave_js.set_lock_usercode
              target:
                entity_id: "{{ lock_entities[repeat.index - 1] }}"
              data:
                code_slot: "{{ code_slots[repeat.index - 1] }}"
                usercode: "{{ lock_code }}"
            - delay:
                seconds: 2
      
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ownerrez_lock_code_active
      
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ownerrez_guest_arrived
      
      - action: persistent_notification.create
        data:
          title: "🔓 Code Activated Early"
          message: >
            **{{ guest_name }}**'s code **{{ lock_code }}** manually activated and programmed to {{ lock_entities | length }} lock(s).
      
      - action: notify.mobile_app_iphone_17
        data:
          title: "🔓 Code Activated Early"
          message: >
            {{ guest_name }}'s code {{ lock_code }} manually activated and programmed to {{ lock_entities | length }} lock(s).